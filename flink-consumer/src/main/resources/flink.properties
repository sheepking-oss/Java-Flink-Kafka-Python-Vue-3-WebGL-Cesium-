# Flink 配置文件

# Flink 作业配置
flink.job.name=TrafficMonitoringJob
flink.parallelism=2
flink.checkpoint.interval=60000

# 时间窗口配置（优化后的配置）
# 水印最大允许延迟（毫秒）- 允许 GPS 数据延迟 30 秒到达
flink.watermark.max.outoforderness.ms=30000
# 事件时间窗口大小（毫秒）- 每秒聚合一次
flink.window.event.time.ms=1000
# 是否启用处理时间回退（当事件时间戳无效时）
flink.window.fallback.to.processing.time=true

# 延迟数据处理配置
# 延迟数据侧输出标签
flink.late.data.tag=late-gps-data
# 是否将延迟数据重新发送到主流程
flink.late.data.forward.to.main=true
# 延迟数据日志记录级别
flink.late.data.log.level=DEBUG

# Kafka 配置
kafka.bootstrap.servers=localhost:9092
kafka.topic.bus.gps=bus-gps-data
kafka.topic.aggregated.gps=aggregated-gps-data
kafka.topic.intersection.traffic=intersection-traffic-data
kafka.topic.late.gps=late-gps-data
kafka.consumer.group.id=flink-traffic-group
kafka.consumer.auto.offset.reset=latest
